<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mengalihkan ke RAF AI</title>
  <meta name="description" content="Mengalihkan ke halaman resmi RAF AI.">
  <meta http-equiv="refresh" content="0; url=https://ai.rafproject.biz.id/">
  <link rel="canonical" href="https://ai.rafproject.biz.id/">
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 32%),
        radial-gradient(circle at top right, rgba(74, 222, 128, 0.16), transparent 28%),
        linear-gradient(180deg, #07111f, #0f1a30);
      color: #e5eef9;
    }

    .panel {
      max-width: 640px;
      padding: 24px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 20px;
      background: rgba(10, 18, 33, 0.82);
      text-align: center;
      box-shadow: 0 20px 60px rgba(1, 7, 20, 0.42);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
    }

    p {
      margin: 0;
      line-height: 1.7;
      color: #9fb1c9;
    }

    a {
      color: #4ade80;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Mengalihkan ke RAF AI</h1>
    <p>Jika halaman tidak berpindah otomatis, buka <a href="https://ai.rafproject.biz.id/">RAF AI resmi</a>.</p>
  </main>
  <script>
    window.location.replace("https://ai.rafproject.biz.id/");
  </script>
</body>
</html>
